name: Build & Release macOS App

on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v0.1.0
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 允许写入仓库内容（创建 Release）

jobs:
  build-macos:
    runs-on: macos-latest  # 使用 macOS 运行器
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build opencode binary
        working-directory: packages/opencode
        run: bun run script/build.ts --single --skip-install
        env:
          OPENCODE_CHANNEL: prod
          BUN_TMPDIR: /tmp

      - name: Build Electron app
        working-directory: packages/desktop
        run: npx electron-vite build
        env:
          OPENCODE_CHANNEL: prod

      - name: Package macOS .app
        working-directory: packages/desktop
        run: npx electron-builder --mac --config electron-builder.config.ts --publish never
        env:
          OPENCODE_CHANNEL: prod
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create zip archive
        working-directory: packages/desktop/dist
        run: |
          if [ -d "mac-arm64" ]; then
            cd mac-arm64
            zip -r -y "../MiMo-Code-${{ steps.version.outputs.version }}-darwin-arm64.zip" "MiMo Code.app"
          fi
          if [ -d "mac-x64" ]; then
            cd mac-x64
            zip -r -y "../MiMo-Code-${{ steps.version.outputs.version }}-darwin-x64.zip" "MiMo Code.app"
          fi
          ls -lh *.zip 2>/dev/null || echo "No zip files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MiMo Code ${{ steps.version.outputs.version }}"
          body: |
            ## MiMo Code v${{ steps.version.outputs.version }}

            ### 🍎 macOS 安装
            1. 下载对应架构的 zip 文件
            2. 解压后将 `MiMo Code Dev.app` 拖到 `/Applications` 文件夹
            3. 首次打开如果提示"无法验证开发者"，请到 **系统设置 → 隐私与安全性** 点击"仍然允许"

            ### 📦 包含内容
            - `MiMo-Code-*-darwin-arm64.zip` — Apple Silicon (M1/M2/M3/M4)
            - `MiMo-Code-*-darwin-x64.zip` — Intel Mac

            ### 🔧 从源码构建
            ```bash
            git clone https://github.com/cl6791731/MiMo-Code.git
            cd MiMo-Code
            bun install
            cd packages/desktop
            OPENCODE_CHANNEL=prod bun run build
            bun run package:mac
            ```
          files: |
            packages/desktop/dist/MiMo-Code-*.zip
          draft: false
          prerelease: false
