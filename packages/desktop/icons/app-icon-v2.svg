<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Gradient: warm orange to deep orange -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8A50"/>
      <stop offset="100%" stop-color="#E85D00"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  
  <!-- Minimalist "Mi" monogram in white -->
  <!-- M shape: two vertical strokes + V connector -->
  <g fill="none" stroke="white" stroke-width="80" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical of M -->
    <line x1="280" y1="300" x2="280" y2="720"/>
    <!-- Right vertical of M -->
    <line x1="744" y1="300" x2="744" y2="720"/>
    <!-- V connector of M -->
    <polyline points="280,300 512,540 744,300"/>
  </g>
  
  <!-- Dot above i (positioned over the left stroke) -->
  <circle cx="280" cy="200" r="48" fill="white"/>
</svg>
