<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main gradient: Xiaomi orange to deep orange -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8533"/>
      <stop offset="50%" style="stop-color:#FF6900"/>
      <stop offset="100%" style="stop-color:#E85D00"/>
    </linearGradient>
    
    <!-- Subtle inner glow -->
    <radialGradient id="innerGlow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    
    <!-- Shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Clip path for rounded rectangle -->
    <clipPath id="roundedRect">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>
  
  <!-- Background: rounded square with gradient -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" 
        fill="url(#orangeGrad)" filter="url(#shadow)"/>
  
  <!-- Inner glow overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" 
        fill="url(#innerGlow)" clip-path="url(#roundedRect)"/>
  
  <!-- Code bracket left: < -->
  <g transform="translate(200, 280)" clip-path="url(#roundedRect)">
    <path d="M 180 200 L 60 340 L 180 480" 
          stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" 
          fill="none" opacity="0.95"/>
  </g>
  
  <!-- Code bracket right: > -->
  <g transform="translate(580, 280)" clip-path="url(#roundedRect)">
    <path d="M 60 200 L 180 340 L 60 480" 
          stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" 
          fill="none" opacity="0.95"/>
  </g>
  
  <!-- Center slash: / -->
  <g transform="translate(390, 260)" clip-path="url(#roundedRect)">
    <path d="M 120 0 L 0 520" 
          stroke="white" stroke-width="72" stroke-linecap="round" 
          fill="none" opacity="0.85"/>
  </g>
  
  <!-- Subtle "Mi" text at bottom -->
  <g transform="translate(0, 720)" clip-path="url(#roundedRect)">
    <text x="512" y="80" text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" 
          font-size="96" font-weight="700" letter-spacing="12"
          fill="white" opacity="0.7">MiMo</text>
  </g>
  
  <!-- Top highlight line for premium feel -->
  <rect x="228" y="40" width="568" height="4" rx="2" ry="2" 
        fill="white" opacity="0.2" clip-path="url(#roundedRect)"/>
</svg>
